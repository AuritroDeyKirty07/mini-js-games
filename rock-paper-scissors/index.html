<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="game-container">
        <h1>Rock • Paper • Scissors</h1>

        <div id="choices">
            <button data-choice="rock" aria-label="Rock">✊</button>
            <button data-choice="paper" aria-label="Paper">✋</button>
            <button data-choice="scissors" aria-label="Scissors">✌</button>
        </div>

        <div id="playerDisplay">PLAYER: -</div>
        <div id="computerDisplay">COMPUTER: -</div>
        <div id="resultDisplay">First to 5 wins!</div>

        <div class="scoreDisplay">
            Player Score: <span id="playerScoreDisplay">0</span>
        </div>

        <div class="scoreDisplay">
            Computer Score: <span id="computerScoreDisplay">0</span>
        </div>

        <button id="resetBtn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
